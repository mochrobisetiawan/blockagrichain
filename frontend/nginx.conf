# nginx untuk SPA React + proxy /api ke backend Go.
# BACKEND_URL di-set via env saat runtime (envsubst) atau hardcode di task definition.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy panggilan API ke service backend (nama Cloud Map / ALB internal di Fargate).
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback — semua rute non-file → index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
