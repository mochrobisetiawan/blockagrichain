# nginx untuk SPA React + proxy /api ke backend Go.
# Proxy dibuat resilient: nginx tetap START walau service `backend` belum ada
# (frontend bisa ditampilkan lebih dulu). /api baru aktif setelah backend hidup.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy panggilan API ke service backend.
  # Resolver + proxy_pass via variabel => resolusi DNS ditunda ke saat request,
  # sehingga nginx tidak gagal start bila `backend` belum terdaftar di DNS.
  location /api/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:8080;
    proxy_pass $backend_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
  }

  # SPA fallback — semua rute non-file → index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
