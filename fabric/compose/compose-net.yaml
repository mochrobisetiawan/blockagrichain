# Jaringan Fabric BlockAgriChain — orderer Raft + 5 peer (1/org) + 5 CouchDB + chaincode CCaaS.
# State DB: CouchDB (sesuai DPPL bab V.3 — World State Database, mendukung rich query).
# Channel participation (Fabric 2.5). Tiap peer wajib 1 CouchDB tersendiri.
#
# Dijalankan via ../network.sh up (perlu urutan: crypto → genesis → up → channel → chaincode).

networks:
  blockagri:
    name: blockagri

volumes:
  orderer.blockagri.id:
  peer0.petani.blockagri.id:
  peer0.bulog.blockagri.id:
  peer0.kementan.blockagri.id:
  peer0.kemenkeu.blockagri.id:
  peer0.pihc.blockagri.id:

services:
  orderer.blockagri.id:
    container_name: orderer.blockagri.id
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:17050
    volumes:
      - ../organizations/ordererOrganizations/blockagri.id/orderers/orderer.blockagri.id/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrganizations/blockagri.id/orderers/orderer.blockagri.id/tls:/var/hyperledger/orderer/tls
      - orderer.blockagri.id:/var/hyperledger/production/orderer
    ports: ["7050:7050", "7053:7053", "17050:17050"]
    networks:
      blockagri:
        aliases: [orderer.blockagri.id]

  # ════════════ CouchDB World State (1 per peer) ════════════
  couchdb0:
    container_name: couchdb0
    image: couchdb:3.3
    environment: [COUCHDB_USER=admin, COUCHDB_PASSWORD=adminpw]
    ports: ["5984:5984"]
    networks: [blockagri]
  couchdb1:
    container_name: couchdb1
    image: couchdb:3.3
    environment: [COUCHDB_USER=admin, COUCHDB_PASSWORD=adminpw]
    ports: ["5985:5984"]
    networks: [blockagri]
  couchdb2:
    container_name: couchdb2
    image: couchdb:3.3
    environment: [COUCHDB_USER=admin, COUCHDB_PASSWORD=adminpw]
    ports: ["5986:5984"]
    networks: [blockagri]
  couchdb3:
    container_name: couchdb3
    image: couchdb:3.3
    environment: [COUCHDB_USER=admin, COUCHDB_PASSWORD=adminpw]
    ports: ["5987:5984"]
    networks: [blockagri]
  couchdb4:
    container_name: couchdb4
    image: couchdb:3.3
    environment: [COUCHDB_USER=admin, COUCHDB_PASSWORD=adminpw]
    ports: ["5988:5984"]
    networks: [blockagri]

  # ─────────── PETANI ───────────
  peer0.petani.blockagri.id:
    container_name: peer0.petani.blockagri.id
    image: hyperledger/fabric-peer:2.5
    depends_on: [couchdb0]
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=blockagri
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9440
      - CORE_PEER_ID=peer0.petani.blockagri.id
      - CORE_PEER_ADDRESS=peer0.petani.blockagri.id:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.petani.blockagri.id:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.petani.blockagri.id:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.petani.blockagri.id:7051
      - CORE_PEER_LOCALMSPID=PetaniMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
    volumes:
      - ../organizations/peerOrganizations/petani.blockagri.id/peers/peer0.petani.blockagri.id/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/petani.blockagri.id/peers/peer0.petani.blockagri.id/tls:/etc/hyperledger/fabric/tls
      - peer0.petani.blockagri.id:/var/hyperledger/production
    ports: ["7051:7051"]
    networks:
      blockagri:
        aliases: [peer0.petani.blockagri.id]

  # ─────────── BULOG ───────────
  peer0.bulog.blockagri.id:
    container_name: peer0.bulog.blockagri.id
    image: hyperledger/fabric-peer:2.5
    depends_on: [couchdb1]
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=blockagri
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9440
      - CORE_PEER_ID=peer0.bulog.blockagri.id
      - CORE_PEER_ADDRESS=peer0.bulog.blockagri.id:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.bulog.blockagri.id:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.bulog.blockagri.id:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.bulog.blockagri.id:8051
      - CORE_PEER_LOCALMSPID=BulogMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
    volumes:
      - ../organizations/peerOrganizations/bulog.blockagri.id/peers/peer0.bulog.blockagri.id/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/bulog.blockagri.id/peers/peer0.bulog.blockagri.id/tls:/etc/hyperledger/fabric/tls
      - peer0.bulog.blockagri.id:/var/hyperledger/production
    ports: ["8051:8051"]
    networks:
      blockagri:
        aliases: [peer0.bulog.blockagri.id]

  # ─────────── KEMENTAN ───────────
  peer0.kementan.blockagri.id:
    container_name: peer0.kementan.blockagri.id
    image: hyperledger/fabric-peer:2.5
    depends_on: [couchdb2]
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb2:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=blockagri
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9440
      - CORE_PEER_ID=peer0.kementan.blockagri.id
      - CORE_PEER_ADDRESS=peer0.kementan.blockagri.id:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.kementan.blockagri.id:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.kementan.blockagri.id:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.kementan.blockagri.id:9051
      - CORE_PEER_LOCALMSPID=KementanMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
    volumes:
      - ../organizations/peerOrganizations/kementan.blockagri.id/peers/peer0.kementan.blockagri.id/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/kementan.blockagri.id/peers/peer0.kementan.blockagri.id/tls:/etc/hyperledger/fabric/tls
      - peer0.kementan.blockagri.id:/var/hyperledger/production
    ports: ["9051:9051"]
    networks:
      blockagri:
        aliases: [peer0.kementan.blockagri.id]

  # ─────────── KEMENKEU ───────────
  peer0.kemenkeu.blockagri.id:
    container_name: peer0.kemenkeu.blockagri.id
    image: hyperledger/fabric-peer:2.5
    depends_on: [couchdb3]
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb3:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=blockagri
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9440
      - CORE_PEER_ID=peer0.kemenkeu.blockagri.id
      - CORE_PEER_ADDRESS=peer0.kemenkeu.blockagri.id:10051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:10051
      - CORE_PEER_CHAINCODEADDRESS=peer0.kemenkeu.blockagri.id:10052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:10052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.kemenkeu.blockagri.id:10051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.kemenkeu.blockagri.id:10051
      - CORE_PEER_LOCALMSPID=KemenkeuMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
    volumes:
      - ../organizations/peerOrganizations/kemenkeu.blockagri.id/peers/peer0.kemenkeu.blockagri.id/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/kemenkeu.blockagri.id/peers/peer0.kemenkeu.blockagri.id/tls:/etc/hyperledger/fabric/tls
      - peer0.kemenkeu.blockagri.id:/var/hyperledger/production
    ports: ["10051:10051"]
    networks:
      blockagri:
        aliases: [peer0.kemenkeu.blockagri.id]

  # ─────────── PIHC ───────────
  peer0.pihc.blockagri.id:
    container_name: peer0.pihc.blockagri.id
    image: hyperledger/fabric-peer:2.5
    depends_on: [couchdb4]
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb4:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=blockagri
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9440
      - CORE_PEER_ID=peer0.pihc.blockagri.id
      - CORE_PEER_ADDRESS=peer0.pihc.blockagri.id:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.pihc.blockagri.id:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.pihc.blockagri.id:11051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.pihc.blockagri.id:11051
      - CORE_PEER_LOCALMSPID=PIHCMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
    volumes:
      - ../organizations/peerOrganizations/pihc.blockagri.id/peers/peer0.pihc.blockagri.id/msp:/etc/hyperledger/fabric/msp
      - ../organizations/peerOrganizations/pihc.blockagri.id/peers/peer0.pihc.blockagri.id/tls:/etc/hyperledger/fabric/tls
      - peer0.pihc.blockagri.id:/var/hyperledger/production
    ports: ["11051:11051"]
    networks:
      blockagri:
        aliases: [peer0.pihc.blockagri.id]

  # ─────────── CHAINCODE (CCaaS) ───────────
  chaincode.blockagri.id:
    container_name: chaincode.blockagri.id
    image: blockagri/chaincode:latest
    build:
      context: ../../chaincode
    environment:
      - CHAINCODE_SERVER_ADDRESS=0.0.0.0:9999
      - CHAINCODE_ID=${CHAINCODE_ID}
    ports: ["9999:9999"]
    networks:
      blockagri:
        aliases: [chaincode.blockagri.id]
